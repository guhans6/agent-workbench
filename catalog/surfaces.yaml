mcp_servers:
  - name: "apple-docs"
    kind: "stdio"
    install: "codex mcp add apple-docs -- npx -y @kimsungwhee/apple-docs-mcp@latest"
    source: "https://github.com/kimsungwhee/apple-docs-mcp"
    auth: "Unsupported"
    status: "enabled"
  - name: "computer-use"
    kind: "plugin-bundled stdio"
    install: "Install the Codex Computer Use/browser-use plugin; do not copy the cache path."
    source: "Codex app/plugin runtime"
    auth: "Unsupported"
    status: "enabled"
  - name: "context7"
    kind: "streamable-http"
    install: "codex mcp add context7 --url https://mcp.context7.com/mcp"
    source: "https://github.com/upstash/context7"
    auth: "OAuth"
    status: "enabled"
  - name: "excalidraw"
    kind: "streamable-http"
    install: "codex mcp add excalidraw --url https://mcp.excalidraw.com"
    source: "https://excalidraw.com"
    auth: "Unsupported"
    status: "enabled"
  - name: "fff"
    kind: "local stdio"
    install: "Install the owning fff-mcp binary, then run: codex mcp add fff -- fff-mcp"
    source: "local-tool-required"
    auth: "Unsupported"
    status: "enabled"
  - name: "github"
    kind: "streamable-http"
    install: "codex mcp add github --url https://api.githubcopilot.com/mcp/ and configure GITHUB_PAT_TOKEN"
    source: "https://github.com/github/github-mcp-server"
    auth: "Bearer token"
    status: "enabled"
  - name: "idesign"
    kind: "local stdio"
    install: "Install idesign-server, then register the local binary path."
    source: "local-tool-required"
    auth: "Unsupported"
    status: "enabled"
  - name: "ifallow"
    kind: "local stdio"
    install: "Install ifallow, then run: codex mcp add ifallow -- /path/to/ifallow serve --mcp"
    source: "local-tool-required"
    auth: "Unsupported"
    status: "enabled"
  - name: "macpilot"
    kind: "local stdio"
    install: "Build or install MacPilotMCP, then register the release binary."
    source: "local-tool-required"
    auth: "Unsupported"
    status: "enabled"
  - name: "node_repl"
    kind: "bundled stdio"
    install: "Comes from the Codex app runtime."
    source: "Codex app runtime"
    auth: "Unsupported"
    status: "enabled"
  - name: "open-design"
    kind: "local stdio"
    install: "Install Open Design CLI and run/register: od mcp --daemon-url http://127.0.0.1:7456"
    source: "local-tool-required"
    auth: "Unsupported"
    status: "enabled"
  - name: "pencil"
    kind: "local stdio"
    install: "Install Pencil for the target editor/agent and register its generated MCP server path."
    source: "local-tool-required"
    auth: "Unsupported"
    status: "enabled"
  - name: "stitch"
    kind: "streamable-http"
    install: "codex mcp add stitch --url https://stitch.googleapis.com/mcp, then log in"
    source: "https://stitch.withgoogle.com"
    auth: "Not logged in"
    status: "enabled"
  - name: "svelte"
    kind: "stdio"
    install: "codex mcp add svelte -- npx -y @sveltejs/mcp"
    source: "https://github.com/sveltejs/ai-tools"
    auth: "Unsupported"
    status: "enabled"
  - name: "xcode"
    kind: "platform stdio"
    install: "Install Xcode and confirm xcrun mcpbridge exists."
    source: "Apple Xcode command line tools"
    auth: "Unsupported"
    status: "enabled"
  - name: "xcodebuildmcp"
    kind: "stdio"
    install: "codex mcp add xcodebuildmcp -- npx -y xcodebuildmcp@latest mcp"
    source: "https://github.com/getsentry/XcodeBuildMCP"
    auth: "Unsupported"
    status: "enabled"
