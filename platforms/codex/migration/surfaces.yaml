snapshot_date: "2026-07-06"
repo:
  name: agent-workbench
  url: https://github.com/guhans6/agent-workbench.git
  migration_entrypoint: platforms/codex/migration/README.md

skill_sources:
  repo_curated:
    portable: true
    root: platforms/codex/skills
    install: "cp -R platforms/codex/skills/<skill> ~/.agents/skills/"
    skills:
      - name: apple-ci-bootstrap
        description: Local-first verification for Apple-platform repositories.
      - name: ios-macos-repo-workflow
        description: Repo-local workflow contract for Xcode-first Apple app repositories.
      - name: publish-workflow
        description: Branch, commit, and PR-boundary workflow.
  codex_system:
    portable: true
    install: "Install or update Codex; do not copy system skill folders."
    source_links:
      - https://github.com/openai/skills
      - https://agentskills.io/specification
      - https://developers.openai.com/codex/skills
    skills:
      - imagegen
      - openai-docs
      - plugin-creator
      - skill-creator
      - skill-installer
  user_global:
    portable: false
    root: "~/.agents/skills"
    migration_note: "Local-only until each skill has an upstream repo link or is vendored into this repo."
  codex_plugins:
    portable: true
    install: "Install through Codex /plugins or the Codex app plugin directory; do not copy ~/.codex/plugins/cache."
    docs: https://developers.openai.com/codex/plugins
    plugin_families:
      - browser-use@openai-bundled
      - computer-use@openai-bundled
      - build-ios-apps@openai-curated
      - build-macos-apps@openai-curated
      - github@openai-curated
      - canva@openai-curated
      - superpowers@openai-curated
      - documents@openai-primary-runtime
      - spreadsheets@openai-primary-runtime
      - presentations@openai-primary-runtime
      - remotion@openai-curated

mcp_servers:
  public:
    - name: apple-docs
      install: "codex mcp add apple-docs -- npx -y @kimsungwhee/apple-docs-mcp@latest"
      source: https://github.com/kimsungwhee/apple-docs-mcp
    - name: context7
      install: "codex mcp add context7 --url https://mcp.context7.com/mcp"
      source: https://github.com/upstash/context7
    - name: svelte
      install: "codex mcp add svelte -- npx -y @sveltejs/mcp"
      source: https://github.com/sveltejs/ai-tools
    - name: xcodebuildmcp
      install: "codex mcp add xcodebuildmcp -- npx -y xcodebuildmcp@latest mcp"
      source: https://github.com/getsentry/XcodeBuildMCP
    - name: github
      install: "codex mcp add github --url https://api.githubcopilot.com/mcp/"
      source: https://github.com/github/github-mcp-server
    - name: excalidraw
      install: "codex mcp add excalidraw --url https://mcp.excalidraw.com"
      source: https://excalidraw.com
    - name: stitch
      install: "codex mcp add stitch --url https://stitch.googleapis.com/mcp"
      source: https://stitch.withgoogle.com
  bundled_or_platform:
    - name: computer-use
      migration_note: Install through Codex plugin/app runtime.
    - name: node_repl
      migration_note: Comes from Codex app runtime.
    - name: xcode
      migration_note: Comes from Xcode command line tools via xcrun mcpbridge.
  local_only:
    - name: fff
      current_command: fff-mcp
    - name: idesign
      current_command: /Users/guhan/.local/bin/idesign-server
    - name: ifallow
      current_command: /Users/Guhan/.local/bin/ifallow serve --mcp
    - name: macpilot
      current_command: /Users/guhan/Guhan/Projects/Xc-build-mcp-mac/MacPilotMCP/release/MacPilotMCP
    - name: open-design
      current_command: od mcp --daemon-url http://127.0.0.1:7456
    - name: pencil
      current_command: /Users/guhan/.pencil/mcp/antigravity_ide/out/mcp-server-darwin-arm64 --app antigravity_ide --agent codexCLI
