schema_version: 1
generated_on: "2026-06-05"
purpose: >
  Agent-only routing and capability catalog for skill and agent selection.
  Use this file to select the right agent, skill, product, or MCP surface
  for a task before implementation starts.

path_rules:
  repo_curated:
    meaning: Repo-relative path that should exist in this checkout.
  shared_agents:
    meaning: User-local shared skill outside the repo; do not assume it exists on another machine.
    same_machine_locator: ~/.agents/skills/<skill-name>/SKILL.md
    remote_machine_policy: >
      If the shared local skill is missing on this machine, do not try to open
      a user-specific absolute path. Tell the agent to either install or sync
      the shared skill set for the target machine, or fall back to repo-curated
      routing assets when possible.

entrypoints:
  human_router:
    path: platforms/codex/AGENT_ROUTING_SKILLS.md
    purpose: Short human-readable routing guide.
  machine_catalog:
    path: platforms/codex/AGENT_ROUTING_SKILLS.yaml
    purpose: Full machine-readable capability inventory and routing rules.
  source_rules:
    - platforms/codex/AGENTS.md
    - platforms/codex/agents/*.toml
    - platforms/codex/skills/*/SKILL.md

selection_rules:
  - Prefer swift_explorer over explorer in Swift, iOS, macOS, Xcode, SwiftUI, UIKit, AppKit, SwiftData, and XCTest repositories.
  - Prefer spark_editor only for tiny localized edits after the target files and scope are already clear.
  - Prefer xcode_triager before deep_debugger for build, test, simulator, scheme, and log failures.
  - Prefer apple_docs_researcher when Apple framework semantics, platform availability, or API behavior is uncertain.
  - Attach a skill only when the task clearly matches that skill's trigger boundary.
  - Use publish-workflow only after the implementation scope is stable enough to commit intentionally.
  - If a task needs current third-party library docs, prefer the context7 MCP surface and the context7-mcp skill.

task_routes:
  - task: Understand an Apple codebase before editing
    preferred_agents: [swift_explorer]
    preferred_skills: []
  - task: Understand a non-Apple codebase before editing
    preferred_agents: [explorer]
    preferred_skills: []
  - task: Make a tiny localized code or UI tweak
    preferred_agents: [spark_editor]
    preferred_skills: []
  - task: Implement a normal Apple feature or medium refactor
    preferred_agents: [swift_worker]
    preferred_skills: []
  - task: Triage build, test, simulator, or scheme failures
    preferred_agents: [xcode_triager]
    preferred_skills: []
  - task: Investigate a hard runtime, concurrency, or migration bug
    preferred_agents: [deep_debugger]
    preferred_skills: [diagnose]
  - task: Check Apple API behavior or availability
    preferred_agents: [apple_docs_researcher]
    preferred_skills: []
  - task: Review a diff for regressions or missing tests
    preferred_agents: [swift_reviewer]
    preferred_skills: []
  - task: Run an exhaustive pre-submit review
    preferred_agents: [gatekeeper]
    preferred_skills: [thermo-nuclear-code-quality-review]
  - task: Bootstrap or refresh repo-local Apple workflow scripts and AGENTS guidance
    preferred_agents: [swift_explorer, swift_worker]
    preferred_skills: [ios-macos-repo-workflow]
  - task: Bootstrap or refresh Apple CI workflows
    preferred_agents: [swift_explorer, swift_worker]
    preferred_skills: [apple-ci-bootstrap]
  - task: Create a branch, commit, push, and prepare PR-ready output
    preferred_agents: [swift_worker]
    preferred_skills: [publish-workflow]
  - task: Research current third-party framework or library docs
    preferred_agents: [explorer]
    preferred_skills: [context7-mcp]
  - task: Turn a broad request into a PRD or implementation issue breakdown
    preferred_agents: [explorer]
    preferred_skills: [to-prd, to-issues]

